<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NightGrindHQ</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0e1116;
    color:#d1d7e0;
    line-height:1.75;
    font-size:17px;

    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;

    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
    user-select:none;
}

/* HEADER */

header{
    position:relative;
    text-align:center;
    background:linear-gradient(180deg,#101722,#0e1116);
    border-bottom:1px solid #1f2937;
    padding:60px 20px 40px;
}

h1{
    margin:0;
    font-size:44px;
    color:#eef2ff;
    letter-spacing:1px;
}

.tagline{
    margin-top:10px;
    color:#94a3b8;
    font-size:16px;
}

/* LANGUAGE SELECTOR */

.language-box{
    position:absolute;
    top:18px;
    right:18px;
    z-index:100;
}

.language-select{
    background:#0f172a;
    color:#cbd5e1;
    border:1px solid #243244;
    border-radius:8px;
    padding:8px 12px;
    font-size:14px;
    outline:none;
    cursor:pointer;
}

.language-select:hover{
    border-color:#5b6cff;
}

/* HERO IMAGE */

.hero{
    position:relative;
    height:420px;
    overflow:hidden;
    border-bottom:1px solid #1f2937;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    filter:grayscale(100%);
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        rgba(14,17,22,.35),
        rgba(14,17,22,.82)
    );
}

.hero-text{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
    text-align:center;
    width:90%;
}

.hero-text h2{
    margin:0;
    color:#e5e7eb;
    font-size:28px;
}

.hero-text p{
    margin-top:10px;
    color:#cbd5e1;
}

/* LAYOUT */

.container{
    max-width:850px;
    margin:auto;
    padding:25px;
}

/* CARDS */

.card{
    background:#121826;
    border:1px solid #1f2937;
    border-radius:14px;
    padding:22px;
    margin-bottom:22px;
}

.card h2{
    margin-top:0;
    color:#b6c2ff;
}

/* DROPDOWN */

details{
    margin-top:15px;
}
