<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NightGrindHQ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f14;
      color: #e6e6e6;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: #151521;
    }

    h1 { margin: 0; font-size: 42px; }
    p { opacity: 0.8; }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1a1a26;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
    }

    a {
      color: #9aa4ff;
      text-decoration: none;
    }

    .player {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #222;
      padding: 10px 15px;
      border-radius: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>NightGrindHQ</h1>
  <p>Get hired. Work nights. Stay focused.</p>
</header>

<div class="container">

  <div class="card">
    <h2>Resume Tools</h2>
    <p>Simple resume templates for BPO and remote work jobs.</p>
  </div>

  <div class="card">
    <h2>Career Guides</h2>
    <p>Interview tips, resume strategies, and job hacks for beginners.</p>
  </div>

  <div class="card">
    <h2>Focus Session</h2>
    <p>First track coming soon. Night shift productivity music.</p>
  </div>

</div>

<div class="player">
  🎵 Vol. 1 (coming soon)
</div>

</body>
</html>
